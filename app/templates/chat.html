<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EduPortal Assistant</title>

<style>

/* ===== GLOBAL ===== */

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  font-family:Inter, Arial;
  color:white;
  margin:0;
}

/* ===== CONTAINER ===== */

.chat-container{
  width:850px;
  margin:auto;
  margin-top:40px;
  background:#1e293b;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  height:85vh;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* ===== HEADER ===== */

.chat-header{
  padding:20px;
  font-size:20px;
  font-weight:600;
  border-bottom:1px solid #334155;
}

/* ===== CHAT ===== */

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

/* ===== MESSAGE ===== */

.message{
  display:flex;
  margin-bottom:15px;
  align-items:flex-start;
  animation:fadeIn 0.25s ease;
}

.user{
  justify-content:flex-end;
}

.message span{
  padding:12px 16px;
  border-radius:14px;
  max-width:65%;
  line-height:1.5;
}

/* USER */

.user span{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
}

/* BOT */

.bot span{
  background:#334155;
}

/* AVATAR */

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  margin:0 10px;
}

/* ===== INPUT ===== */

.input-area{
  display:flex;
  padding:15px;
  border-top:1px solid #334155;
  background:#0f172a;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:14px;
  background:#1e293b;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 20px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

button:hover{
  background:#16a34a;
  transform:scale(1.05);
}

/* ===== TYPING ===== */

.typing span{
  opacity:0.6;
  font-style:italic;
}

/* ===== ANIMATION ===== */

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

/* ===== SCROLL ===== */

.chat-box::-webkit-scrollbar{
  width:6px;
}

.chat-box::-webkit-scrollbar-thumb{
  background:#475569;
  border-radius:10px;
}

</style>

</head>

<body>

<div class="chat-container">

  <div class="chat-header">
    🤖 EduPortal Assistant
  </div>

  <div id="chat" class="chat-box"></div>

  <div class="input-area">
    <input id="question" placeholder="Pose ta question sur le cours..." />
    <button onclick="ask()">Envoyer</button>
  </div>

</div>

<script>

const chat = document.getElementById("chat")

// SAFE TEXT (important 🔥)
function escapeHTML(text){
  return text.replace(/</g,"&lt;").replace(/>/g,"&gt;")
}

// MESSAGE INITIAL
chat.innerHTML += `
<div class="message bot">
<img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
<span>Bonjour 👋 je suis ton assistant EduPortal. Pose-moi une question !</span>
</div>
`

// ASK FUNCTION
async function ask(){

  const input = document.getElementById("question")
  const question = input.value.trim()

  if(!question) return

  // USER MESSAGE
  chat.innerHTML += `
  <div class="message user">
    <span>${escapeHTML(question)}</span>
    <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
  </div>
  `

  input.value=""

  // TYPING
  chat.innerHTML += `
  <div class="message bot typing" id="typing">
    <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
    <span>En train d'écrire...</span>
  </div>
  `

  chat.scrollTop = chat.scrollHeight

  try{

    const res = await fetch("/chatbot",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({question})
    })

    const data = await res.json()

    document.getElementById("typing").remove()

    chat.innerHTML += `
    <div class="message bot">
      <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
      <span>${escapeHTML(data.answer || data.response || "Pas de réponse")}</span>
    </div>
    `

  } catch(error){

    document.getElementById("typing").remove()

    chat.innerHTML += `
    <div class="message bot">
      <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
      <span>Erreur serveur 😢</span>
    </div>
    `
  }

  chat.scrollTop = chat.scrollHeight
}

// ENTER KEY
document.getElementById("question").addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    ask()
  }
})

</script>

</body>
</html>
