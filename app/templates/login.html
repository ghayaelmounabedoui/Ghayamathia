{% extends 'base.html' %}

{% block title %}Connexion — EduPortal{% endblock %}

{% block content %}

<div class="auth-wrap">

  <div class="auth-card">

    <!-- LOGO -->
    <div class="brand" style="margin-bottom:20px">
      <div class="logo">E</div>
      EduPortal
    </div>

    <h2 style="margin-bottom:10px">Connexion</h2>
    <p class="muted" style="margin-bottom:20px">
      Accède à ton espace étudiant / enseignant
    </p>

    {% if error %}
      <div style="background:#7f1d1d;padding:10px;border-radius:10px;margin-bottom:15px">
        {{ error }}
      </div>
    {% endif %}

    {% if message %}
      <div style="background:#064e3b;padding:10px;border-radius:10px;margin-bottom:15px">
        {{ message }}
      </div>
    {% endif %}

    <!-- FORM -->
    <form method="post" action="/login">

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="ex: ghaya@email.com" required>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="********" required>
      </div>

      <button class="btn btn-primary" type="submit" style="width:100%;margin-top:10px">
        Se connecter
      </button>

    </form>

    <!-- FOOTER -->
    <p class="footer-note" style="margin-top:15px">
      Pas encore de compte ?
      <a href="/register" style="color:#93c5fd">S'inscrire</a>
    </p>

  </div>

</div>

{% endblock %}
