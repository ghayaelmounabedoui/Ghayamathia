{% extends 'base.html' %}
{% block title %}Inscription{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand" style="margin-bottom:18px"><div class="logo">E</div>EduPortal</div>
    <h2>Créer un compte</h2>
    <p class="muted">Inscription immédiate avec rôle étudiant ou enseignant.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/register">
      <div class="grid grid-2">
        <div class="form-group"><label>Prénom</label><input name="first_name" required></div>
        <div class="form-group"><label>Nom</label><input name="last_name" required></div>
      </div>
      <div class="form-group"><label>Nom d'utilisateur</label><input name="username" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="grid grid-2">
        <div class="form-group"><label>Mot de passe</label><input type="password" name="password" required></div>
        <div class="form-group"><label>Rôle</label><select name="role"><option value="student">Étudiant</option><option value="teacher">Enseignant</option></select></div>
      </div>
      <button class="btn btn-success" type="submit" style="width:100%">S'inscrire</button>
    </form>
    <p class="footer-note">Déjà un compte ? <a href="/login" style="color:#93c5fd">Se connecter</a></p>
  </div>
</div>
{% endblock %}
